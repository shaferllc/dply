name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: BYO
            directory: .
          - name: dply-core
            directory: packages/dply-core

    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dply_testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dply_testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: dply_testing
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_pgsql, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Laravel application
        if: matrix.directory != 'packages/dply-core'
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Run tests (Laravel)
        if: matrix.directory != 'packages/dply-core'
        run: php artisan test

      - name: Run tests (dply-core)
        if: matrix.directory == 'packages/dply-core'
        run: vendor/bin/phpunit
