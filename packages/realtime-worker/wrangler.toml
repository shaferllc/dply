name = "dply-realtime"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Keep the *.workers.dev URL alongside the custom domain (useful fallback while
# the custom domain cert provisions, and for quick probes).
workers_dev = true

# Placeholder — replace with your Cloudflare account values before deploy.
# Deploy once to your platform account; dply provisions apps into it by
# writing credentials into the APPS KV namespace (it never re-deploys the
# Worker). See README.md.
#
# Serve on the branded host via a SPECIFIC zone route, NOT a custom_domain.
# The Edge worker owns a wildcard route `*.on-dply.site/*` on this same zone; a
# custom_domain for realtime.on-dply.site is shadowed by that wildcard and falls
# through to Edge (404 "Host not configured"). A more-specific route wins over
# the wildcard, so realtime.on-dply.site/* routes here. Relies on the zone's
# wildcard proxied DNS + Universal SSL (which covers one subdomain level). Must
# stay at the top level — a key under [vars] becomes an env var, not a route.
routes = [
  { pattern = "realtime.on-dply.site/*", zone_name = "on-dply.site" },
]

[vars]
ENVIRONMENT = "production"

# Per-app credentials, written by dply at provision time:
#   key:{appKey}  -> { id, key, secret, enabled, maxConnections, ... }
#   id:{appId}    -> { id, key, secret, enabled, maxConnections, ... }
[[kv_namespaces]]
binding = "APPS"
id = "3048de6f485943fd98affd21d91c33aa"

# One Durable Object instance per app id. Holds all live WebSocket
# connections for that app and fans out channel/presence messages.
[[durable_objects.bindings]]
name = "APP_HUB"
class_name = "AppHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AppHub"]

# Workers Logs: retain console.log output in the Cloudflare dashboard
# (Workers & Pages → dply-realtime → Logs) and power `wrangler tail`. The
# worker logs connect/subscribe/publish events as structured objects.
# head_sampling_rate = 1 keeps 100% of invocations (fine at this volume).
# NOTE: keep this table LAST — a [table] header before the top-level `routes`
# key would capture it as observability.routes and drop the custom domain.
[observability]
enabled = true
head_sampling_rate = 1
