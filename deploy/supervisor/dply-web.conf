; dply control-plane — web tier (DPLY_RUNTIME=web)
;
; This tier no longer runs any supervisor-managed process.
;
; Realtime/broadcasting moved off the in-box Reverb daemon and onto the dply
; managed realtime Worker (packages/realtime-worker) on Cloudflare — the same
; Pusher-compatible relay customers use. Laravel publishes over the `pusher`
; broadcast connection (PUSHER_HOST=<realtime host>), so nothing needs to listen
; on this box.
;
; HTTP is nginx + php-fpm (not managed here). Horizon and schedule:work must NOT
; run on this host.
;
; Decommission on the box (one-time, after cutover):
;   sudo rm /etc/supervisor/conf.d/dply-reverb.conf
;   sudo supervisorctl reread && sudo supervisorctl update   # drops dply-reverb
