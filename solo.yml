# Visit https://soloterm.com to learn more
name: dply
icon: null
processes:
  Scheduler:
    command: php artisan schedule:work
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  npm:dev:
    command: npm run dev
    working_dir: null
    auto_start: true
    auto_restart: false
    restart_when_changed: []
    env: {}
  Reverb:
    command: php artisan reverb:start
    working_dir: null
    auto_start: true
    auto_restart: true
    restart_when_changed: []
    env: {}
  Pail:
    command: php artisan pail
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Pint:
    command: vendor/bin/pint --test
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Logs:
    command: tail -n 50 -f storage/logs/laravel.log
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Horizon:
    command: php artisan horizon:listen
    working_dir: null
    auto_start: true
    auto_restart: true
    restart_when_changed: []
    env: {}
  Queue:
    command: php artisan queue:work
    working_dir: null
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
