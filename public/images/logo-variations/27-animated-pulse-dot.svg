<svg width="122" height="72" viewBox="0 0 122 72" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Instrument Sans','Helvetica Neue',Arial,sans-serif">
  <!-- Animated: pulsing "live" status ring around a solid dot -->
  <circle cx="11" cy="46" r="6" fill="#5b8a4a" fill-opacity="0.4">
    <animate attributeName="r" values="6;13;6" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.45;0;0.45" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="11" cy="46" r="6" fill="#5b8a4a"/>
  <text x="26" y="52" font-size="50" font-weight="700" letter-spacing="-1.5" fill="#171a0e">dply</text>
</svg>
