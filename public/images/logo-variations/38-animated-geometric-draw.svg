<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Animated: the geometric d draws itself (stroke-dashoffset), holds, erases, loops -->
  <rect x="4" y="4" width="88" height="88" rx="22" fill="#171a0e"/>
  <circle cx="40" cy="58" r="13" fill="none" stroke="#cda942" stroke-width="10" stroke-dasharray="82" stroke-dashoffset="82">
    <animate attributeName="stroke-dashoffset" values="82;0;0;82" keyTimes="0;0.5;0.8;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <path d="M62 22 V74" stroke="#cda942" stroke-width="10" stroke-linecap="round" stroke-dasharray="52" stroke-dashoffset="52">
    <animate attributeName="stroke-dashoffset" values="52;0;0;52" keyTimes="0;0.5;0.8;1" dur="2.6s" repeatCount="indefinite"/>
  </path>
</svg>
