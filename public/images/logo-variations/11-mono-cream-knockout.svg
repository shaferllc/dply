<svg width="148" height="96" viewBox="0 0 148 96" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Instrument Sans','Helvetica Neue',Arial,sans-serif">
  <!-- Single-color cream (dark backgrounds): the "d" is knocked out of the badge so the
       dark background shows through. Transparent bg. -->
  <defs>
    <mask id="dKnockoutCream">
      <rect x="4" y="16" width="64" height="64" rx="16" fill="#ffffff"/>
      <text x="37" y="65" font-size="46" font-weight="700" fill="#000000" text-anchor="middle">d</text>
    </mask>
  </defs>
  <rect x="4" y="16" width="64" height="64" rx="16" fill="#fdfcf9" mask="url(#dKnockoutCream)"/>
  <text x="76" y="64" font-size="50" font-weight="700" letter-spacing="-1.5" fill="#fdfcf9">ply</text>
</svg>
