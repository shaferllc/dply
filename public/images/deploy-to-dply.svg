<svg xmlns="http://www.w3.org/2000/svg" width="124" height="20" role="img" aria-label="Deploy to dply">
  <title>Deploy to dply</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r"><rect width="124" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="62" height="20" fill="#171a0e"/>
    <rect x="62" width="62" height="20" fill="#cda942"/>
    <rect width="124" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
    <text x="320" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="500">Deploy to</text>
    <text x="320" y="140" transform="scale(.1)" textLength="500">Deploy to</text>
    <text x="920" y="150" fill="#171a0e" fill-opacity=".25" transform="scale(.1)" textLength="500">dply</text>
    <text x="920" y="140" fill="#171a0e" transform="scale(.1)" textLength="500">dply</text>
  </g>
</svg>
