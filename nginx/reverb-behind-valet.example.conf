# =============================================================================
# Reverb WebSocket proxy for https://dplyi.test (Valet / Laravel Herd / nginx)
# =============================================================================
#
# Your Echo log shows the RIGHT URL now:
#   wss://dplyi.test/app/<REVERB_APP_KEY>?...
#
# That still fails until something on port 443 forwards /app/* to Reverb.
# Reverb itself only speaks plain WebSocket on REVERB_SERVER_PORT (e.g. 8081).
#
# -----------------------------------------------------------------------------
# 1) Run Reverb (must be listening before testing)
# -----------------------------------------------------------------------------
#   php artisan reverb:start
#   # or: composer dev
#
# Quick check:
#   nc -zv 127.0.0.1 8081
#   curl -i -N -H "Connection: Upgrade" -H "Upgrade: websocket" http://127.0.0.1:8081/app/test
#
# -----------------------------------------------------------------------------
# 2) Add this block inside the HTTPS server { } for dplyi.test
# -----------------------------------------------------------------------------
#
# Valet (classic path):
#   ~/.config/valet/Nginx/dplyi.test
#
# Laravel Herd (common path — confirm in Herd UI / docs):
#   ~/Library/Application Support/Herd/config/valet/Nginx/dplyi.test
#
# Put `location /app` ABOVE any catch-all `location /` if you paste manually.
# Change 8081 if your .env uses REVERB_SERVER_PORT= something else.
#
# Then:
#   valet restart
#   # Herd: restart nginx from the Herd app or menu
#
# -----------------------------------------------------------------------------
# 3) Match .env (example for TLS site + proxy)
# -----------------------------------------------------------------------------
#
#   REVERB_HOST=
#   REVERB_SCHEME=https
#   REVERB_PORT=443
#   REVERB_SERVER_PORT=8081
#
# -----------------------------------------------------------------------------
# 4) No nginx? Use HTTP for the whole app (simplest local-only)
# -----------------------------------------------------------------------------
#
# Open http://dplyi.test (not https), then:
#   REVERB_SCHEME=http
#   REVERB_PORT=8081
#   REVERB_SERVER_PORT=8081
#   REVERB_HOST=   (empty → same host as the page)
#
# =============================================================================

location /app {
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_pass http://127.0.0.1:8081;
}
